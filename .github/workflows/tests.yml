# This workflow installs dependencies with uv, lints with flake8, and runs the
# tests across supported Python versions.
# For more information see: https://docs.astral.sh/uv/guides/integration/github/

name: arfpy tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    - name: Install the project
      run: uv sync
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        uv run --with flake8 flake8 . --count --select=E9,F63,F7,F82 --exclude=.venv --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        uv run --with flake8 flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --exclude=.venv --statistics
    - name: Test with unittest
      run: uv run python tests/test.py
